    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f172a;
      color: #e2e8f0;
      font-family: Georgia, 'Times New Roman', serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem;
    }
    #root { width: 100%; max-width: 780px; }

    /* ── CARDS ── */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 2.25rem 2.5rem;
      box-shadow: 0 8px 32px rgba(0,0,0,.45);

      margin-bottom: 2rem;

    .app-header h1 {

      font-weight: 700;
      background: linear-gradient(135deg, #22d3ee, #a78bfa);

      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.25;
      margin-bottom: .4rem;
    }
    .app-header p { color: #94a3b8; font-size: .95rem; font-family: 'Helvetica Neue', sans-serif; }

      margin-bottom: 1.6rem;

      justify-content: space-between;
      font-size: .82rem;
      font-family: 'Helvetica Neue', sans-serif;
      color: #94a3b8;
      margin-bottom: .45rem;
    }
    .progress-track {
      height: 8px;
      background: #334155;
      border-radius: 99px;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #22d3ee, #a78bfa);
      border-radius: 99px;
      transition: width .4s ease;
    }

    /* ── QUESTION ── */
    .question-topic {
      display: inline-block;
      background: rgba(34,211,238,.12);
      color: #22d3ee;
      font-size: .78rem;
      font-family: 'Helvetica Neue', sans-serif;
      letter-spacing: .06em;
      text-transform: uppercase;
      padding: .25rem .75rem;
      border-radius: 99px;
      margin-bottom: 1rem;
    }
    .question-text {
      font-size: 1.15rem;
      line-height: 1.65;
      color: #f1f5f9;
      margin-bottom: 1.5rem;
    }

    .option-btn {

      align-items: flex-start;
      gap: .85rem;
      background: #0f172a;
      border: 1.5px solid #334155;
      border-radius: 10px;
      padding: .85rem 1.1rem;
      cursor: pointer;
      text-align: left;
      transition: border-color .18s, background .18s, transform .1s;
      font-family: Georgia, serif;
      font-size: .97rem;
      color: #cbd5e1;
      line-height: 1.5;
    }
    .option-btn:hover:not(:disabled) {
      border-color: #22d3ee;
      background: rgba(34,211,238,.06);
      transform: translateX(3px);
    }
    .option-btn.selected {
      border-color: #a78bfa;
      background: rgba(167,139,250,.1);
      color: #f1f5f9;
    }
    .option-btn.correct {
      border-color: #4ade80;
      background: rgba(74,222,128,.1);
      color: #bbf7d0;
    }
    .option-btn.incorrect {
      border-color: #f87171;
      background: rgba(248,113,113,.1);
      color: #fecaca;
    }
    .option-btn.reveal-correct {
      border-color: #4ade80;
      background: rgba(74,222,128,.07);
      color: #bbf7d0;
    }
    .option-btn:disabled { cursor: default; transform: none; }
    .option-letter {

      height: 26px;
      border-radius: 6px;
      background: #1e293b;
      border: 1px solid #475569;

      align-items: center;
      justify-content: center;
      font-size: .8rem;
      font-family: 'Helvetica Neue', sans-serif;
      font-weight: 700;
      color: #94a3b8;

    .option-btn.reveal-correct .option-letter { background: #4ade80; border-color: #4ade80; color: #052e16; }
    .option-btn.incorrect .option-letter { background: #f87171; border-color: #f87171; color: #fff; }

      margin-bottom: 1.4rem;

      align-items: center;

      justify-content: center;
      gap: .5rem;
      padding: .7rem 1.6rem;
      border-radius: 10px;
      font-family: 'Helvetica Neue', sans-serif;
      font-size: .97rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .18s, transform .1s, box-shadow .18s;
      border: none;

    .btn:active:not(:disabled) { transform: translateY(0); }
    .btn:disabled { opacity: .38; cursor: not-allowed; }

      border-radius: 10px;
      padding: 1rem;

      color: #64748b;
      font-family: 'Helvetica Neue', sans-serif;

      height: 140px;

    .score-ring-text .sub { font-size: .75rem; color: #64748b; font-family: 'Helvetica Neue', sans-serif; }

      display: inline-block;
      font-size: 1.4rem;
      font-weight: 700;
      padding: .4rem 1.2rem;
      border-radius: 10px;
      margin-bottom: 1rem;

    .grade-B { background: rgba(34,211,238,.15); color: #22d3ee; border: 1px solid rgba(34,211,238,.3); }

      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
      gap: .5rem;

    .review-nav { display: flex; align-items: center; gap: .75rem; }
    .review-counter { font-family: 'Helvetica Neue', sans-serif; font-size: .88rem; color: #64748b; }
    .review-status {
      font-family: 'Helvetica Neue', sans-serif;
      font-size: .82rem;
      font-weight: 600;
      padding: .25rem .75rem;
      border-radius: 99px;
      margin-bottom: 1rem;

    .review-status.correct { background: rgba(74,222,128,.12); color: #4ade80; }
    .review-status.incorrect { background: rgba(248,113,113,.12); color: #f87171; }
    .review-your { font-size: .8rem; font-family: 'Helvetica Neue', sans-serif; color: #64748b; margin-bottom: .25rem; }

    /* ── DIVIDER ── */
    .divider { height: 1px; background: #1e293b; margin: 1.5rem 0; }

    @media (max-width: 500px) {
      .card { padding: 1.5rem 1.2rem; }
      .info-grid { grid-template-columns: 1fr; }
      .btn-row { flex-direction: column; }
      .btn { width: 100%; }
    }
  </style>
</head>

/* ─────────────── UTILS ─────────────── */
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions(bank, n = 20) {
  return shuffle(bank).slice(0, n);
}

function getGrade(pct) {
  if (pct >= 90) return 'A';
  if (pct >= 80) return 'B';
  if (pct >= 70) return 'C';
  if (pct >= 60) return 'D';
  return 'F';
}

function getEncouragement(pct) {
  if (pct === 100) return "Perfect score! You've mastered Strategic Management. Outstanding work!";
  if (pct >= 90)  return "Excellent performance! You have a strong command of the material.";
  if (pct >= 80)  return "Great job! You're well-prepared for the exam with just a bit more review.";
  if (pct >= 70)  return "Good effort! Focus on the topics you missed and you'll do well on exam day.";
  if (pct >= 60)  return "You're on the right track — review the highlighted concepts and try again!";
  return "Keep studying! Use this review to target your weak areas and come back stronger.";
}

const LETTERS = ['A', 'B', 'C', 'D'];

/* ─────────────── SCREEN: START ─────────────── */
function StartScreen({ onStart }) {
  return (
    <div className="card start-screen">
      <div className="badge">Strategic Management · Midterm Prep</div>
      <h2>Ready to Test Your Knowledge?</h2>
      <p>
        Each quiz draws <strong>20 random questions</strong> from a bank of{' '}
        <strong>50 topics</strong> covering your full study guide — strategy frameworks,
        PESTEL, Porter's Five Forces, VRIO, value chain, and more.
      </p>
      <div className="info-grid">
        <div className="info-card">
          <div className="val">50</div>
          <div className="lbl">Total Questions</div>
        </div>
        <div className="info-card">
          <div className="val">20</div>
          <div className="lbl">Per Quiz Attempt</div>
        </div>
        <div className="info-card">
          <div className="val">A–F</div>
          <div className="lbl">Letter Grade</div>
        </div>
      </div>
      <button className="btn btn-primary" style={{ width: '100%', fontSize: '1.05rem', padding: '.85rem' }} onClick={onStart}>
        Start Quiz →
      </button>
    </div>
  );
}

/* ─────────────── SCREEN: QUIZ ─────────────── */
function QuizScreen({ questions, onFinish }) {
  const [current, setCurrent]   = useState(0);
  const [selected, setSelected] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [answers, setAnswers]   = useState([]);

  const q = questions[current];
  const total = questions.length;
  const progress = confirmed ? ((current + 1) / total) * 100 : (current / total) * 100;

  function handleSelect(idx) {
    if (!confirmed) setSelected(idx);
  }

  function handleConfirm() {
    if (selected === null) return;
    setConfirmed(true);
  }

  function handleNext() {
    const newAnswers = [...answers, { selected, correct: q.answer }];
    if (current + 1 < total) {
      setAnswers(newAnswers);
      setCurrent(current + 1);
      setSelected(null);
      setConfirmed(false);
    } else {
      onFinish(newAnswers);
    }
  }

  const isCorrect = confirmed && selected === q.answer;

  function optionClass(idx) {
    if (!confirmed) return selected === idx ? 'option-btn selected' : 'option-btn';
    if (idx === q.answer) return 'option-btn reveal-correct';
    if (idx === selected && selected !== q.answer) return 'option-btn incorrect';
    return 'option-btn';
  }

  return (
    <div className="card">
      {/* Progress */}
      <div className="progress-wrap">
        <div className="progress-meta">
          <span>Question {current + 1} of {total}</span>
          <span>{Math.round(progress)}% complete</span>
        </div>
        <div className="progress-track">
          <div className="progress-fill" style={{ width: `${progress}%` }} />
        </div>
      </div>

      {/* Topic chip */}
      <div className="question-topic">{q.topic}</div>

      {/* Question */}
      <p className="question-text">{q.question}</p>

      {/* Options */}
      <div className="options">
        {q.options.map((opt, idx) => (
          <button
            key={idx}
            className={optionClass(idx)}
            onClick={() => handleSelect(idx)}
            disabled={confirmed}
          >
            <span className="option-letter">{LETTERS[idx]}</span>
            <span>{opt}</span>
          </button>
        ))}
      </div>

      {/* Feedback */}
      {confirmed && (
        <div className={`feedback ${isCorrect ? 'correct' : 'incorrect'}`}>
          <span className="feedback-icon">{isCorrect ? '✓' : '✗'}</span>
          <span>
            {isCorrect
              ? 'Correct! Well done.'
              : `Incorrect. The correct answer is ${LETTERS[q.answer]}: ${q.options[q.answer]}`}
          </span>
        </div>
      )}

      {/* Action buttons */}
      <div className="btn-row">
        {!confirmed ? (
          <button
            className="btn btn-primary"
            onClick={handleConfirm}
            disabled={selected === null}
          >
            Confirm Answer
          </button>
        ) : (
          <button className="btn btn-primary" onClick={handleNext}>
            {current + 1 < total ? 'Next Question →' : 'See Results →'}
          </button>
        )}
      </div>
    </div>
  );
}

/* ─────────────── SCREEN: RESULTS ─────────────── */
function ResultsScreen({ questions, answers, onRetake, onReview }) {
  const score = answers.filter(a => a.selected === a.correct).length;
  const total = answers.length;
  const pct   = Math.round((score / total) * 100);
  const grade = getGrade(pct);
  const encouragement = getEncouragement(pct);

  // SVG ring
  const radius = 54;
  const circ   = 2 * Math.PI * radius;
  const dash   = (pct / 100) * circ;

  return (
    <div className="card results-screen">
      <h2 style={{ fontSize: '1.5rem', color: '#f1f5f9', marginBottom: '1.25rem' }}>Quiz Results</h2>

      {/* Score ring */}
      <div className="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r={radius} fill="none" stroke="#1e293b" strokeWidth="12" />
          <circle
            cx="70" cy="70" r={radius}
            fill="none"
            stroke="url(#ringGrad)"
            strokeWidth="12"
            strokeDasharray={`${dash} ${circ}`}
            strokeLinecap="round"
          />
          <defs>
            <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" stopColor="#22d3ee" />
              <stop offset="100%" stopColor="#a78bfa" />
            </linearGradient>
          </defs>
        </svg>
        <div className="score-ring-text">
          <span className="big">{score}/{total}</span>
          <span className="sub">{pct}%</span>
        </div>
      </div>

      {/* Grade badge */}
      <div className={`grade-badge grade-${grade}`}>Grade: {grade}</div>

      {/* Encouragement */}
      <p className="encourage">{encouragement}</p>

      {/* Breakdown */}
      <div style={{ display: 'flex', justifyContent: 'center', gap: '2rem', marginBottom: '1.8rem', fontFamily: "'Helvetica Neue', sans-serif", fontSize: '.9rem' }}>
        <span style={{ color: '#4ade80' }}>✓ {score} Correct</span>
        <span style={{ color: '#f87171' }}>✗ {total - score} Incorrect</span>
      </div>

      <div className="results-btns">
        <button className="btn btn-primary" onClick={onReview}>Review Answers</button>
        <button className="btn btn-secondary" onClick={onRetake}>Retake Quiz (New Questions)</button>
      </div>
    </div>
  );
}

/* ─────────────── SCREEN: REVIEW ─────────────── */
function ReviewScreen({ questions, answers, onRetake }) {
  const [idx, setIdx] = useState(0);
  const total = questions.length;
  const q     = questions[idx];
  const a     = answers[idx];
  const wasCorrect = a.selected === a.correct;

  function optionClass(i) {
    if (i === a.correct && i === a.selected) return 'option-btn correct';
    if (i === a.correct) return 'option-btn reveal-correct';
    if (i === a.selected) return 'option-btn incorrect';
    return 'option-btn';
  }

  return (
    <div className="card">
      <div className="review-header">
        <h2>Review Answers</h2>
        <div className="review-nav">
          <span className="review-counter">{idx + 1} / {total}</span>
          <button className="btn btn-secondary" style={{ padding: '.4rem .9rem', fontSize: '.85rem' }} onClick={() => setIdx(Math.max(0, idx - 1))} disabled={idx === 0}>← Prev</button>
          <button className="btn btn-secondary" style={{ padding: '.4rem .9rem', fontSize: '.85rem' }} onClick={() => setIdx(Math.min(total - 1, idx + 1))} disabled={idx === total - 1}>Next →</button>
        </div>
      </div>

      <div className={`review-status ${wasCorrect ? 'correct' : 'incorrect'}`}>
        {wasCorrect ? '✓ Correct' : '✗ Incorrect'}
      </div>

      <div className="question-topic">{q.topic}</div>
      <p className="question-text">{q.question}</p>

      <div className="options">
        {q.options.map((opt, i) => (
          <button key={i} className={optionClass(i)} disabled>
            <span className="option-letter">{LETTERS[i]}</span>
            <span>
              {opt}
              {i === a.selected && i !== a.correct && <span style={{ fontFamily: "'Helvetica Neue', sans-serif", fontSize: '.8rem', marginLeft: '.4rem', opacity: .8 }}>(your answer)</span>}
              {i === a.correct && <span style={{ fontFamily: "'Helvetica Neue', sans-serif", fontSize: '.8rem', marginLeft: '.4rem', opacity: .8 }}>(correct answer)</span>}
            </span>
          </button>
        ))}
      </div>

      <div className="divider" />
      <div className="btn-row">
        <button className="btn btn-secondary" onClick={onRetake}>Retake Quiz</button>
      </div>
    </div>
  );
}

/* ─────────────── APP ROOT ─────────────── */
function App() {
  const [screen, setScreen]       = useState('start');  // start | quiz | results | review
  const [questions, setQuestions] = useState([]);
  const [answers, setAnswers]     = useState([]);

  function startQuiz() {
    setQuestions(pickQuestions(QUESTION_BANK, 20));
    setAnswers([]);
    setScreen('quiz');
  }

  function handleFinish(finalAnswers) {
    setAnswers(finalAnswers);
    setScreen('results');
  }

  function handleRetake() {
    startQuiz();
  }

  function handleReview() {
    setScreen('review');
  }

  return (
    <div>
      <div className="app-header">
        <h1>Strategic Management Midterm Quiz</h1>
        <p>50-question bank · 20 questions per attempt · Randomized each time</p>
      </div>

      {screen === 'start'   && <StartScreen onStart={startQuiz} />}
      {screen === 'quiz'    && <QuizScreen questions={questions} onFinish={handleFinish} />}
      {screen === 'results' && <ResultsScreen questions={questions} answers={answers} onRetake={handleRetake} onReview={handleReview} />}
      {screen === 'review'  && <ReviewScreen questions={questions} answers={answers} onRetake={handleRetake} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
